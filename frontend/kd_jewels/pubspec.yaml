name: kd_jewels
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  carousel_slider: ^5.0.0

  #Api call
  dio: ^5.7.0
  
  #state management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  #bottom Bar
  curved_labeled_navigation_bar: ^2.0.6

  #otp text field
  pin_code_fields: ^8.0.1

  #shared_preferences: ^2.3.2

  flutter_screenutil: ^5.9.3

  # Json
  json_annotation: ^4.9.0

  image_picker: ^1.2.1

  dropdown_search: ^5.0.6

  flutter_secure_storage: ^10.0.0

  # DI
  get_it: ^8.0.2

  # Size manage
  sizer: ^2.0.15

  # Local paths
  path_provider: ^2.1.3

  # Use for wrapper class generate
  freezed_annotation: ^2.4.1

  flutter_easyloading: ^3.0.5

  google_fonts: ^6.2.1

  #block screenshot
  no_screenshot: ^0.3.1

flutter:

  uses-material-design: true 
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

